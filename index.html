<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>Modern Calculator</title>
  <style>
    :root{
      --bg:#0e0e0e; --panel:#1b1b1b; --screen:#060606; --key:#2a2a2a; --key2:#353535;
      --text:#f4f4f4; --muted:#9b9b9b; --green:#39e600; --green2:#21b700;
      --shadow:0 24px 70px rgba(0,0,0,.45);
    }
    body.light{
      --bg:#f0f3f7; --panel:#ffffff; --screen:#f7f7f7; --key:#eef1f5; --key2:#e4e8ee;
      --text:#111111; --muted:#6b7280; --green:#18c91e; --green2:#0fa516;
      --shadow:0 24px 70px rgba(17,24,39,.12);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:radial-gradient(circle at top, rgba(57,230,0,.08), transparent 38%), var(--bg);
      color:var(--text);
    }
    .app{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:0;
    }
    .phone{
      width:min(720px,100vw);
      height:min(1600px,100vh);
      background:linear-gradient(180deg,var(--screen) 0 56%, var(--panel) 56% 100%);
      position:relative;
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .topbar{
      display:flex; justify-content:space-between; align-items:center;
      padding:18px 16px 0;
      position:absolute; top:0; left:0; right:0;
      z-index:2;
    }
    .btn-ghost{
      width:44px; height:44px; border:0; border-radius:50%;
      background:transparent; color:var(--text); font-size:1.45rem;
    }
    .display{
      position:absolute; left:0; right:0; top:78px; bottom:52%;
      padding:26px 24px 18px;
      display:flex; flex-direction:column; justify-content:flex-end; align-items:flex-end;
      text-align:right;
      z-index:1;
    }
    .expr{min-height:28px; width:100%; color:var(--muted); font-size:1.05rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .main{
      width:100%;
      font-size:clamp(3rem, 10vw, 5.7rem);
      line-height:1.05;
      font-weight:300;
      letter-spacing:-0.04em;
      overflow-wrap:anywhere;
    }
    .handle{
      position:absolute; left:50%; top:50%; transform:translateX(-50%);
      width:56px; height:5px; border-radius:999px; background:rgba(255,255,255,.35);
      opacity:.75;
    }
    .pad{
      position:absolute; left:0; right:0; bottom:0;
      padding:26px 22px calc(24px + env(safe-area-inset-bottom));
      display:grid;
      grid-template-columns:repeat(4,1fr);
      grid-template-rows:repeat(5,minmax(76px,1fr));
      gap:16px;
    }
    .key{
      border:0; border-radius:999px;
      background:var(--key);
      color:var(--text);
      font-size:1.8rem;
      font-weight:500;
      cursor:pointer;
      min-height:76px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
      transition:transform .08s ease, background .08s ease;
      user-select:none; -webkit-tap-highlight-color:transparent;
    }
    .key:active{transform:scale(.985); background:var(--key2);}
    .func,.op{color:var(--green); font-size:1.65rem}
    .back{font-size:1.4rem}
    .zero{grid-column:2}
    .equal{
      grid-column:4; grid-row:4 / span 2;
      background:linear-gradient(180deg,var(--green) 0%, var(--green2) 100%);
      color:#fff; font-size:2.25rem;
    }
    .equal:active{background:linear-gradient(180deg,#4af21b 0%, #23a900 100%)}
    .footer{
      position:absolute; left:0; right:0; bottom:8px;
      padding:0 24px;
      display:flex; justify-content:space-between;
      color:rgba(255,255,255,.55); font-size:.82rem; pointer-events:none;
    }
    body.light .footer{color:rgba(17,17,17,.45)}
    @media (max-width:480px){
      .phone{width:100vw;height:100vh}
      .pad{gap:12px;padding:20px 16px calc(20px + env(safe-area-inset-bottom))}
      .key{min-height:64px}
      .display{padding:26px 18px 18px}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="phone" aria-label="Calculator">
      <div class="topbar">
        <button id="themeBtn" class="btn-ghost" aria-label="Toggle theme">☾</button>
        <button id="infoBtn" class="btn-ghost" aria-label="Info">i</button>
      </div>

      <section class="display" aria-live="polite">
        <div id="expr" class="expr"></div>
        <div id="main" class="main">0</div>
      </section>

      <div class="handle" aria-hidden="true"></div>

      <section class="pad" aria-label="Calculator buttons">
        <button class="key func" data-action="clear">C</button>
        <button class="key func" data-action="divide">÷</button>
        <button class="key func" data-action="multiply">×</button>
        <button class="key func back" data-action="backspace">⌫</button>

        <button class="key num" data-value="7">7</button>
        <button class="key num" data-value="8">8</button>
        <button class="key num" data-value="9">9</button>
        <button class="key op" data-action="subtract">−</button>

        <button class="key num" data-value="4">4</button>
        <button class="key num" data-value="5">5</button>
        <button class="key num" data-value="6">6</button>
        <button class="key op" data-action="add">+</button>

        <button class="key num" data-value="1">1</button>
        <button class="key num" data-value="2">2</button>
        <button class="key num" data-value="3">3</button>
        <button class="key equal" data-action="equals">=</button>

        <button class="key func" data-action="percent">%</button>
        <button class="key num zero" data-value="0">0</button>
        <button class="key num" data-value=".">.</button>
      </section>

      <div class="footer">
        <span>Offline ready</span>
        <span>GitHub Pages ready</span>
      </div>
    </section>
  </main>

  <script>
    // Remove old service workers / caches from previous broken versions.
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      } catch (e) {}
    })();

    const exprEl = document.getElementById('expr');
    const mainEl = document.getElementById('main');
    const themeBtn = document.getElementById('themeBtn');
    const infoBtn = document.getElementById('infoBtn');

    let expr = '';
    let result = '';
    let dark = true;

    function normalize(s){
      return s.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').replace(/%/g,'/100');
    }

    function safeEval(s){
      const n = normalize(s);
      if (!n.trim()) return 0;
      if (!/^[0-9+\-*/().\s]+$/.test(n)) throw new Error('Invalid');
      return Function('"use strict";return (' + n + ')')();
    }

    function fmt(v){
      if (!Number.isFinite(v)) return 'Error';
      const abs = Math.abs(v);
      const out = (abs !== 0 && (abs < 1e-8 || abs > 1e12)) ? v.toExponential(8) : String(Number(v.toFixed(10)));
      return out.replace(/\.0+$/,'');
    }

    function render(){
      mainEl.textContent = expr || result || '0';
      exprEl.textContent = result && expr ? `${expr} =` : '';
    }

    function clearAll(){
      expr = '';
      result = '';
      render();
    }

    function append(value){
      if (mainEl.textContent === 'Error') clearAll();
      const ops = ['+','−','×','÷','-'];
      const last = expr.slice(-1);
      if (!expr && ops.includes(value)) return;
      if (ops.includes(value) && ops.includes(last)) {
        expr = expr.slice(0,-1) + value;
      } else {
        expr += value;
      }
      render();
    }

    function backspace(){
      if (mainEl.textContent === 'Error') return clearAll();
      expr = expr.slice(0,-1);
      render();
    }

    function calculate(){
      try{
        const v = safeEval(expr);
        result = fmt(v);
        expr = result;
        exprEl.textContent = '';
        mainEl.textContent = result;
      }catch(e){
        expr = '';
        result = '';
        mainEl.textContent = 'Error';
        exprEl.textContent = '';
      }
    }

    document.querySelectorAll('.key').forEach(btn => {
      btn.addEventListener('click', () => {
        const a = btn.dataset.action;
        const v = btn.dataset.value;
        if (v) return append(v);
        if (a === 'clear') return clearAll();
        if (a === 'backspace') return backspace();
        if (a === 'equals') return calculate();
        if (a === 'percent') return append('%');
        if (a === 'divide') return append('÷');
        if (a === 'multiply') return append('×');
        if (a === 'subtract') return append('−');
        if (a === 'add') return append('+');
      });
    });

    themeBtn.addEventListener('click', () => {
      dark = !dark;
      document.body.classList.toggle('light', !dark);
      themeBtn.textContent = dark ? '☾' : '☀';
    });

    infoBtn.addEventListener('click', () => {
      alert('Keyboard: 0-9, +, -, *, /, %, (, ), Enter, Backspace, Esc');
    });

    document.addEventListener('keydown', (e) => {
      const k = e.key;
      if ('0123456789'.includes(k)) return append(k);
      if (k === '.') return append('.');
      if (k === '+') return append('+');
      if (k === '-') return append('−');
      if (k === '*') return append('×');
      if (k === '/') return append('÷');
      if (k === '%') return append('%');
      if (k === 'Enter' || k === '=') { e.preventDefault(); return calculate(); }
      if (k === 'Backspace') return backspace();
      if (k === 'Escape') return clearAll();
      if (k === '(' || k === ')') return append(k);
    });

    render();
  </script>
</body>
</html>
