<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <meta name="description" content="Modern responsive calculator" />
  <title>Modern Calculator</title>
  <style>
    :root{
      --bg: #0d0d0d;
      --panel: #151515;
      --screen: #090909;
      --keys: #252525;
      --key: #2f2f2f;
      --key-hover: #3a3a3a;
      --text: #f4f4f4;
      --muted: rgba(255,255,255,.56);
      --accent: #39e600;
      --accent-2: #2fc200;
      --danger: #ff5a5a;
      --shadow: 0 30px 80px rgba(0,0,0,.45);
      --radius: 28px;
    }

    body.light{
      --bg: #f2f4f8;
      --panel: #ffffff;
      --screen: #111111;
      --keys: #eceef2;
      --key: #f6f6f6;
      --key-hover: #e7e7e7;
      --text: #101114;
      --muted: rgba(16,17,20,.58);
      --accent: #2fd21a;
      --accent-2: #20b008;
      --shadow: 0 24px 60px rgba(16,17,20,.14);
    }

    *{ box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(57,230,0,.08), transparent 35%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app{
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .calculator{
      width: min(430px, 100%);
      background: var(--panel);
      border: 1px solid rgba(148,163,184,.18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 18px 18px 0;
    }

    .brand{
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .eyebrow{
      margin: 0;
      font-size: .78rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .title{
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.1;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn{
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--text);
      font-size: 1.25rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      opacity: .92;
    }

    .icon-btn:hover{
      background: rgba(255,255,255,.06);
    }

    .display-card{
      margin: 18px 18px 0;
      background: var(--screen);
      border-radius: 24px;
      padding: 18px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      text-align: right;
      border: 1px solid rgba(255,255,255,.08);
    }

    .history{
      width: 100%;
      min-height: 22px;
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display{
      width: 100%;
      margin-top: 8px;
      font-size: clamp(2.2rem, 7vw, 4.4rem);
      line-height: .95;
      font-weight: 300;
      letter-spacing: -0.05em;
      overflow-wrap: anywhere;
      word-break: break-word;
      min-height: 1.1em;
    }

    .sub{
      width: 100%;
      min-height: 20px;
      margin-top: 8px;
      color: var(--muted);
      font-size: .9rem;
    }

    .handle{
      width: 58px;
      height: 5px;
      border-radius: 999px;
      margin: 14px auto 0;
      background: rgba(255,255,255,.34);
      opacity: .8;
    }

    .pad{
      background: var(--keys);
      padding: 18px;
      margin-top: 16px;
    }

    .grid{
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-template-rows: repeat(5, minmax(66px, 1fr));
      gap: 14px;
      align-items: stretch;
    }

    button.key{
      border: 0;
      border-radius: 999px;
      background: var(--key);
      color: var(--text);
      font-size: 1.45rem;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
      min-height: 66px;
      display: grid;
      place-items: center;
    }

    button.key:hover{
      background: var(--key-hover);
      transform: translateY(-1px);
    }

    button.key:active{
      transform: translateY(0);
      filter: brightness(.98);
    }

    .func{ color: var(--accent); }
    .op{ color: var(--accent); font-size: 1.55rem; }
    .equal{
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #fff;
      grid-column: 4;
      grid-row: 4 / span 2;
      font-size: 2rem;
    }

    .equal:hover{
      background: linear-gradient(180deg, #4cf31e 0%, #28b800 100%);
    }

    .zero{
      grid-column: 2;
    }

    .footer{
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 18px 18px;
      color: var(--muted);
      font-size: .82rem;
    }

    .footer span{
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 420px){
      .app{ padding: 0; }
      .calculator{
        width: 100vw;
        min-height: 100vh;
        border-radius: 0;
      }
      .display-card{
        margin: 16px 16px 0;
        min-height: 42vh;
      }
      .pad{
        padding: 16px;
      }
      .grid{
        gap: 12px;
        grid-template-rows: repeat(5, minmax(60px, 1fr));
      }
      button.key{
        min-height: 60px;
        font-size: 1.35rem;
      }
      .equal{
        font-size: 1.9rem;
      }
    }

    @media (min-width: 900px){
      .calculator{
        transform: scale(1.02);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="calculator" aria-label="Calculator">
      <header class="topbar">
        <div class="brand">
          <p class="eyebrow">Web Calculator</p>
          <h1 class="title">Modern Calculator</h1>
        </div>
        <button class="icon-btn" id="themeBtn" aria-label="Toggle theme">☾</button>
      </header>

      <section class="display-card" aria-live="polite">
        <div id="history" class="history"></div>
        <div id="display" class="display">0</div>
        <div id="sub" class="sub"></div>
      </section>

      <div class="handle" aria-hidden="true"></div>

      <section class="pad" aria-label="Calculator keypad">
        <div class="grid">
          <button class="key func" data-action="clear">C</button>
          <button class="key func" data-action="divide">÷</button>
          <button class="key func" data-action="multiply">×</button>
          <button class="key func" data-action="backspace">⌫</button>

          <button class="key" data-value="7">7</button>
          <button class="key" data-value="8">8</button>
          <button class="key" data-value="9">9</button>
          <button class="key op" data-action="subtract">−</button>

          <button class="key" data-value="4">4</button>
          <button class="key" data-value="5">5</button>
          <button class="key" data-value="6">6</button>
          <button class="key op" data-action="add">+</button>

          <button class="key" data-value="1">1</button>
          <button class="key" data-value="2">2</button>
          <button class="key" data-value="3">3</button>
          <button class="key equal" data-action="equals">=</button>

          <button class="key func" data-action="percent">%</button>
          <button class="key zero" data-value="0">0</button>
          <button class="key" data-value=".">.</button>
        </div>
      </section>

      <footer class="footer">
        <span>Responsive</span>
        <span>GitHub Pages ready</span>
      </footer>
    </section>
  </main>

  <script>
    const display = document.getElementById('display');
    const historyEl = document.getElementById('history');
    const subEl = document.getElementById('sub');
    const themeBtn = document.getElementById('themeBtn');

    let expression = '';
    let lastResult = '';
    let darkMode = true;

    const isOperator = (ch) => ['+', '-', '×', '÷'].includes(ch);

    function trimOperators(str) {
      return str.replace(/[+\-×÷]+$/g, '');
    }

    function normalize(expr) {
      return expr
        .replace(/×/g, '*')
        .replace(/÷/g, '/')
        .replace(/−/g, '-')
        .replace(/\s+/g, '');
    }

    function safeEvaluate(expr) {
      const normalized = normalize(expr);
      if (!normalized) return 0;
      if (!/^[0-9+\-*/().]+$/.test(normalized)) {
        throw new Error('Invalid expression');
      }
      // eslint-disable-next-line no-new-func
      return Function(`"use strict"; return (${normalized});`)();
    }

    function formatNumber(value) {
      if (!Number.isFinite(value)) return 'Error';
      const abs = Math.abs(value);
      if ((abs !== 0 && abs < 1e-8) || abs > 1e12) {
        return value.toExponential(8).replace(/\.?0+e/, 'e');
      }
      return String(Number(value.toFixed(10))).replace(/\.0+$/, '');
    }

    function currentNumberRange(expr) {
      const match = expr.match(/(\d*\.?\d+)$/);
      if (!match) return null;
      const start = expr.length - match[1].length;
      return { start, end: expr.length, value: match[1] };
    }

    function render() {
      display.textContent = expression || '0';
      historyEl.textContent = lastResult ? `${expression || lastResult} =` : '';
      subEl.textContent = lastResult ? `Result: ${lastResult}` : '';
    }

    function clearAll() {
      expression = '';
      lastResult = '';
      display.textContent = '0';
      historyEl.textContent = '';
      subEl.textContent = '';
    }

    function appendValue(value) {
      if (display.textContent === 'Error') {
        clearAll();
      }

      if (value === '.' && (!expression || isOperator(expression.slice(-1)))) {
        expression += '0.';
        render();
        return;
      }

      const last = expression.slice(-1);

      if (isOperator(value)) {
        if (!expression && value !== '-') return;
        if (isOperator(last)) {
          expression = expression.slice(0, -1) + value;
        } else {
          expression += value;
        }
        render();
        return;
      }

      if (value === '.') {
        const parts = expression.split(/[\+\-×÷]/);
        const current = parts[parts.length - 1];
        if (current.includes('.')) return;
        expression += '.';
        render();
        return;
      }

      expression += value;
      render();
    }

    function backspace() {
      if (display.textContent === 'Error') {
        clearAll();
        return;
      }
      expression = expression.slice(0, -1);
      render();
    }

    function applyPercent() {
      if (!expression) return;
      if (display.textContent === 'Error') {
        clearAll();
        return;
      }

      const range = currentNumberRange(expression);
      if (!range) return;

      const num = Number(range.value);
      if (!Number.isFinite(num)) return;

      const converted = String(num / 100);
      expression = expression.slice(0, range.start) + converted;
      render();
    }

    function calculate() {
      try {
        const cleaned = trimOperators(expression);
        if (!cleaned) return;

        const result = safeEvaluate(cleaned);
        lastResult = formatNumber(result);
        historyEl.textContent = `${cleaned} =`;
        subEl.textContent = 'Completed';
        expression = lastResult;
        display.textContent = lastResult;
      } catch (err) {
        display.textContent = 'Error';
        historyEl.textContent = '';
        subEl.textContent = 'Check the expression';
        expression = '';
        lastResult = '';
      }
    }

    function toggleTheme() {
      darkMode = !darkMode;
      document.body.classList.toggle('light', !darkMode);
      themeBtn.textContent = darkMode ? '☾' : '☀';
    }

    document.querySelectorAll('.key').forEach((btn) => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        const value = btn.dataset.value;

        if (value) {
          appendValue(value);
          return;
        }

        switch (action) {
          case 'clear':
            clearAll();
            break;
          case 'backspace':
            backspace();
            break;
          case 'percent':
            applyPercent();
            break;
          case 'equals':
            calculate();
            break;
          case 'divide':
            appendValue('÷');
            break;
          case 'multiply':
            appendValue('×');
            break;
          case 'subtract':
            appendValue('-');
            break;
          case 'add':
            appendValue('+');
            break;
        }
      });
    });

    themeBtn.addEventListener('click', toggleTheme);

    document.addEventListener('keydown', (e) => {
      const k = e.key;

      if ((k >= '0' && k <= '9') || k === '.') {
        appendValue(k);
        return;
      }

      if (k === '+') return appendValue('+');
      if (k === '-') return appendValue('-');
      if (k === '*') return appendValue('×');
      if (k === '/') return appendValue('÷');
      if (k === '%') return applyPercent();

      if (k === 'Enter' || k === '=') {
        e.preventDefault();
        calculate();
        return;
      }

      if (k === 'Backspace') return backspace();
      if (k === 'Escape') return clearAll();
    });

    render();
  </script>
</body>
</html>
